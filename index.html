<!DOCTYPE html>
<html>
<body>
    <h1>Asistente PACO</h1>
    <button id="btn" style="padding:20px; font-size:20px;">🎙️ Hablar</button>
    <p id="status">Esperando...</p>

    <script>
        const btn = document.getElementById('btn');
        const status = document.getElementById('status');
        
        btn.onclick = () => {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'es-ES';
            
            recognition.onstart = () => { status.innerText = "Escuchando..."; };
            recognition.onresult = (e) => { status.innerText = "Dijiste: " + e.results[0][0].transcript; };
            recognition.onerror = (e) => { status.innerText = "Error: " + e.error; };
            
            recognition.start();
        };
    </script>
</body>
</html>
