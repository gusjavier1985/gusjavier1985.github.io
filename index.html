<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PACO - Asistente</title>
<style>
body { font-family: sans-serif; text-align: center; padding: 20px; }
#mic-btn { background-color: #512da8; color: white; border: none; padding: 25px; border-radius: 50%; font-size: 30px; cursor: pointer; margin: 20px; }
#response { margin-top: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 10px; min-height: 50px; font-size: 18px; }
</style>
</head>
<body>
<img src="1000983856.jpg" alt="Logo de PACO" style="width: 200px;">
<h1>Asistente PACO</h1>
<p>Línea B • Sector Tráfico</p>

<button id="mic-btn">🎙️</button>
<div id="response">Presioná el micrófono para hablar</div>

<script>
// PEGA TU CLAVE AQUÍ ABAJO (tiene que empezar con AIza)
const API_KEY = "AIzaSyAiylSNm5n8xVtbN3dhmFhZFn6K3N5NsSQ";

const micBtn = document.getElementById('mic-btn');
const resDiv = document.getElementById('response');
const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
recognition.lang = 'es-ES';

micBtn.onclick = () => recognition.start();

recognition.onresult = async (event) => {
const userText = event.results[0][0].transcript;
resDiv.innerText = "Escuchado: " + userText + "... pensando...";
try {
const response = await fetch(https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}, {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({ contents: [{ parts: [{ text: userText }] }] })
});
const data = await response.json();
resDiv.innerText = data.candidates[0].content.parts[0].text;
} catch (e) { resDiv.innerText = "Error: No pude conectar con PACO."; }
};
</script>
</body>
</html>
