<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Asistente PACO</title>
</head>
<body style="text-align: center; font-family: sans-serif; padding: 20px;">
<h1>Asistente PACO</h1>
<button id="btn" style="padding:20px; font-size:20px;">🎙️ Hablar con PACO</button>
<p id="status">Presioná el botón para hablar</p>
<p id="resultado" style="font-weight: bold;"></p>

<script>
const API_KEY = 'AQ.Ab8RN6L0U3iYCkBlUiBLQcSJyMAXqtK8ECP8oq4S0SzExLU_QQ'; // <-- PONÉ TU CLAVE ACÁ
const btn = document.getElementById('btn');
const status = document.getElementById('status');
const resultado = document.getElementById('resultado');

btn.onclick = () => {
const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
recognition.lang = 'es-ES';

recognition.onstart = () => { status.innerText = "Escuchando..."; };

recognition.onresult = async (e) => {
const texto = e.results[0][0].transcript;
resultado.innerText = "Dijiste: " + texto;
status.innerText = "Pensando...";

try {
const response = await fetch(https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}, {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({ contents: [{ parts: [{ text: texto }] }] })
});
const data = await response.json();
const pacoRespuesta = data.candidates[0].content.parts[0].text;
status.innerText = "PACO dice: " + pacoRespuesta;
} catch (error) {
status.innerText = "Error al conectar con la IA.";
}
};

recognition.onerror = (e) => { status.innerText = "Error: " + e.error; };
recognition.start();
};
</script>
</body>
</html>
