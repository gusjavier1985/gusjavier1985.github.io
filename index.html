<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Asistente PACO</title>
</head>
<body style="text-align: center; font-family: sans-serif; padding: 20px;">
<h1>Asistente PACO</h1>
<button id="mic-btn" style="background-color: #512da8; color: white; padding: 20px; border-radius: 20px; border: none; font-size: 20px; cursor: pointer;">
🎙️ Hablar con PACO
</button>
<div id="status" style="margin-top: 20px; font-size: 18px; color: #555;">Presioná el botón</div>
<div id="resultado" style="margin-top: 10px; font-weight: bold;"></div>

<script>
const API_KEY = 'AIzaSyAiylSNm5n8xVtbN3dhmFhZFn6K3N5NsSQ';
const micBtn = document.getElementById('mic-btn');
const status = document.getElementById('status');
const resultado = document.getElementById('resultado');

const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
recognition.lang = 'es-ES';

micBtn.onclick = () => {
recognition.start();
status.innerText = "🎤 Escuchando...";
};

recognition.onresult = async (event) => {
const texto = event.results[0][0].transcript;
resultado.innerText = "Dijiste: " + texto;
status.innerText = "Procesando...";

try {
const response = await fetch(https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}, {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({ contents: [{ parts: [{ text: texto }] }] })
});

if (!response.ok) {
const errData = await response.json();
status.innerText = "Error API (" + response.status + "): " + errData.error.message;
return;
}

const data = await response.json();
const respuesta = data.candidates[0].content.parts[0].text;
status.innerText = "PACO: " + respuesta;
} catch (error) {
status.innerText = "Error de conexión: " + error.message;
}
};
</script>
</body>
</html>
