<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Asistente PACO</title>
</head>
<body style="text-align: center; font-family: sans-serif; padding: 20px;">
<h1>Asistente PACO</h1>
<button id="mic-btn" style="background-color: #512da8; color: white; padding: 20px; border-radius: 20px; border: none; font-size: 20px;">🎙️ Hablar con PACO</button>
<div id="resultado" style="margin-top: 20px;"></div>
<div id="respuesta-paco" style="margin-top: 20px; font-weight: bold; color: #2e7d32;"></div>

<script>
const API_KEY = '.AIzaSyAiylSNm5n8xVtbN3dhmFhZFn6K3N5NsSQ'; // <--- PONÉ TU CLAVE ACÁ
const micBtn = document.getElementById('mic-btn');
const resultado = document.getElementById('resultado');
const respuestaPaco = document.getElementById('respuesta-paco');

const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
recognition.lang = 'es-ES';

micBtn.onclick = () => {
resultado.innerText = "Escuchando...";
recognition.start();
};

recognition.onresult = async (event) => {
const texto = event.results[0][0].transcript;
resultado.innerText = "Dijiste: " + texto;
respuestaPaco.innerText = "PACO está pensando...";

// Llamada a Gemini
const response = await fetch(https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}, {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({ contents: [{ parts: [{ text: texto }] }] })
});

const data = await response.json();
const respuesta = data.candidates[0].content.parts[0].text;
respuestaPaco.innerText = "PACO dice: " + respuesta;
};
</script>
</body>
</html>
