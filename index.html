<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente PACO</title>
</head>
<body style="text-align: center; font-family: sans-serif; padding: 20px;">

    <h1>Asistente PACO</h1>
    <p>Línea B • Sector Tráfico</p>

    <button id="mic-btn" style="background-color: #512da8; color: white; padding: 20px; border-radius: 20px; border: none; font-size: 20px; cursor: pointer;">
        🎙️ Hablar con PACO
    </button>
    
    <div id="resultado" style="margin-top: 20px; font-size: 18px; color: #333;"></div>

    <script>
        const micBtn = document.getElementById('mic-btn');
        const resultado = document.getElementById('resultado');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'es-ES';
        recognition.continuous = false; 

        let estaEscuchando = false;

        micBtn.onclick = () => {
            if (estaEscuchando) {
                recognition.stop();
                resultado.innerText = "Detenido manualmente.";
                estaEscuchando = false;
            } else {
                recognition.start();
                resultado.innerText = "Escuchando... (Apretá de nuevo para parar)";
                estaEscuchando = true;
            }
        };

        recognition.onresult = (event) => {
            const texto = event.results[0][0].transcript;
            resultado.innerText = "Dijiste: " + texto;
            estaEscuchando = false;
        };

        recognition.onend = () => {
            estaEscuchando = false;
        };

        recognition.onerror = (event) => {
            resultado.innerText = "Error: " + event.error;
            estaEscuchando = false;
        };
    </script>
</body>
</html>
