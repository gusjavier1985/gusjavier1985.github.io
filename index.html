<button id="mic-btn" style="background-color: #512da8; color: white; padding: 20px; border-radius: 20px; border: none; font-size: 20px;">
    🎙️ Hablar con PACO
</button>
<div id="resultado" style="margin-top: 20px; font-size: 18px;"></div>

<script>
    const micBtn = document.getElementById('mic-btn');
    const resultado = document.getElementById('resultado');

    // Configuración para navegadores modernos
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    
    recognition.lang = 'es-ES';
    
    micBtn.onclick = () => {
        resultado.innerText = "Escuchando...";
        recognition.start();
    };

    recognition.onresult = (event) => {
        const texto = event.results[0][0].transcript;
        resultado.innerText = "Dijiste: " + texto;
        // AQUÍ ES DONDE PACO DEBERÍA PROCESAR EL TEXTO
    };

    recognition.onerror = (event) => {
        resultado.innerText = "Error: " + event.error + ". Asegurate de estar usando HTTPS.";
    };
</script>
