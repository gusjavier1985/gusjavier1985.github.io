
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistente PACO</title>
</head>
<body style="text-align: center; font-family: sans-serif; padding: 20px; background-color: #f4f4f9;">

<h1>Asistente PACO</h1>
<p>Línea B • Sector Tráfico</p>

<button id="mic-btn" style="background-color: #512da8; color: white; padding: 20px 30px; border-radius: 20px; border: none; font-size: 20px; cursor: pointer;">
🎙️ Hablar con PACO
</button>

<div id="status" style="margin-top: 20px; font-size: 18px; color: #555;">Presioná el botón para hablar</div>
<div id="resultado" style="margin-top: 10px; font-weight: bold; color: #333;"></div>
<div id="respuesta-paco" style="margin-top: 20px; font-size: 18px; color: #2e7d32; font-weight: bold;"></div>

<script>
// --- AQUÍ VA TU CLAVE API ---
const API_KEY = 'AIzaSyAiylSNm5n8xVtbN3dhmFhZFn6K3N5NsSQ';
// ----------------------------

const micBtn = document.getElementById('mic-btn');
const status = document.getElementById('status');
const resultado = document.getElementById('resultado');
const respuestaPaco = document.getElementById('respuesta-paco');

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();
recognition.lang = 'es-ES';
recognition.continuous = false;

let escuchando = false;

micBtn.onclick = () => {
if (!escuchando) {
try {
recognition.start();
escuchando = true;
status.innerText = "🎤 Escuchando...";
resultado.innerText = "";
respuestaPaco.innerText = "";
} catch (e) {
status.innerText = "Error: " + e.message;
}
}
};

recognition.onresult = async (event) => {
escuchando = false;
const texto = event.results[0][0].transcript;
resultado.innerText = "Dijiste: " + texto;
status.innerText = "Procesando con Gemini...";

try {
const response = await fetch(https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}, {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({ contents: [{ parts: [{ text: texto }] }] })
});

if (!response.ok) {
const errData = await response.json();
status.innerText = "Error API: " + (errData.error.message || "Revisar clave");
return;
}

const data = await response.json();
const respuesta = data.candidates[0].content.parts[0].text;

status.innerText = "";
respuestaPaco.innerText = "PACO: " + respuesta;

// Opcional: El celular habla la respuesta
const voz = new SpeechSynthesisUtterance(respuesta);
voz.lang = 'es-ES';
window.speechSynthesis.speak(voz);

} catch (error) {
status.innerText = "Error de conexión: " + error.message;
}
};

recognition.onerror = (event) => {
escuchando = false;
status.innerText = "Error: " + event.error + ". Asegurate de haber dado permiso.";
};

recognition.onend = () => {
escuchando = false;
};
</script>
</body>
</html>
