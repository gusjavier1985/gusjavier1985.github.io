<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Asistente PACO</title>
</head>
<body style="text-align: center; font-family: sans-serif; padding: 20px;">
    <h1>Asistente PACO</h1>
    <button id="mic-btn" style="background-color: #512da8; color: white; padding: 20px; border-radius: 20px; border: none; font-size: 20px; cursor: pointer;">
        🎙️ Hablar con PACO
    </button>
    <div id="status" style="margin-top: 20px; font-size: 18px; color: #555;">Presioná el botón para hablar</div>
    <div id="resultado" style="margin-top: 10px; font-weight: bold;"></div>

    <script>
        const micBtn = document.getElementById('mic-btn');
        const status = document.getElementById('status');
        const resultado = document.getElementById('resultado');
        
        // Inicializar el reconocimiento
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'es-ES';

        // Al hacer clic, forzamos el inicio
        micBtn.onclick = () => {
            try {
                recognition.start();
                status.innerText = "🎤 Escuchando...";
                resultado.innerText = "";
            } catch (e) {
                status.innerText = "Ya está escuchando o error: " + e.message;
            }
        };

        recognition.onresult = (event) => {
            const texto = event.results[0][0].transcript;
            resultado.innerText = "Dijiste: " + texto;
            status.innerText = "Procesando...";
        };

        recognition.onerror = (event) => {
            status.innerText = "Error: " + event.error + ". Asegurate de haber dado permiso.";
        };
    </script>
</body>
</html>
